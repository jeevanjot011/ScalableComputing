name: CI/CD Pipeline - Simple

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ================== JOB 1: TEST & SECURITY ==================
  test-and-security:
    name: Test + Bandit Security
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest coverage bandit boto3
    
    - name: Run Bandit Security Scan
      run: |
        bandit -r loan_service/ eb-website/ -ll || true
    
    - name: Run tests (if any)
      run: |
        cd loan_service
        python -m pytest ../tests/ -v || true
        cd ..

  # ================== JOB 2: SONARCLOUD ==================
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test-and-security  # Wait for tests first
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
  
    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v6
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ================== JOB 3: ZAP SECURITY SCAN ==================
  zap-scan:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    needs: test-and-security
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run ZAP Baseline Scan
      uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
      with:
        target: "http://newapp-env.eba-pbimppjz.us-east-1.elasticbeanstalk.com/"
        fail_action: false
        cmd_options: "-a"
        
    - name: Upload ZAP Reports
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: |
          report_html.html
          report_json.json

  # ================== JOB 4: DEPLOY TO EB ==================
  deploy-frontend:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: [test-and-security, sonar, zap-scan]  # Wait for all checks
    if: github.ref == 'refs/heads/main'  # Only on main branch
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: us-east-1
    
    - name: Generate Deployment Package
      run: |
        cd eb-website
        zip -r ../deploy.zip .
        cd ..
        echo "Created deploy.zip"
        ls -lh deploy.zip
    
    - name: Deploy to Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v20
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
        application_name: newapp
        environment_name: Newapp-env
        version_label: "v-${{ github.run_number }}-${{ github.sha }}"
        region: us-east-1
        deployment_package: deploy.zip

  # ================== JOB 5: SMOKE TEST ==================
  smoke-test:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy-frontend  # Wait for deployment
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Wait for deployment
      run: sleep 30
    
    - name: Test Frontend
      run: |
        curl -f http://newapp-env.eba-pbimppjz.us-east-1.elasticbeanstalk.com/ || exit 1
        echo "✅ Frontend is live!"
    
    - name: Test Loan API
      run: |
        curl -X POST \
          https://v68fi30gr9.execute-api.us-east-1.amazonaws.com/prod/loan/calculate \
          -H "Content-Type: application/json" \
          -d '{"principal": 100000, "annual_rate": 10, "years": 5}' \
          | grep -q "emi" && echo "✅ API working!" || exit 1
    
    - name: Success!
      run: echo "🎉 All deployments successful!"
