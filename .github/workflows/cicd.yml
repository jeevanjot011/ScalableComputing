name: CI/CD Pipeline

permissions:
  issues: write
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ================== CI PIPELINE ==================
  ci_pipeline:
    name: Python CI + Bandit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r eb-website/requirements.txt
        pip install pytest coverage bandit

    - name: Run tests
      run: |
        cd eb-website
        python -m pytest test_app.py -v || true
        cd ..

    - name: Generate coverage
      run: |
        cd eb-website
        coverage run -m pytest test_app.py || true
        coverage xml || true
        cd ..

    - name: Upload Coverage XML
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: eb-website/coverage.xml

    - name: Run Bandit Security Scan
      run: bandit -r eb-website/ loan_service/ -ll || true

  # ================== SONARCLOUD ==================
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: ci_pipeline
  
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  
  
      # ✅ Download coverage file from CI job
      - name: Download Coverage XML
        uses: actions/download-artifact@v4
        with:
         name: coverage-xml
         path: eb-website
  
      # ✅ Debug (optional)
      - name: Verify coverage file
        run: ls -la eb-website
  
      # ✅ Sonar scan with coverage
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
         args: >
          -Dsonar.python.coverage.reportPaths=eb-website/coverage.xml

  # ================== ZAP BASELINE SCAN ==================
  zap-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: ci_pipeline

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run ZAP Baseline Scan
      uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
      with:
        target: "http://newapp-env.eba-pbimppjz.us-east-1.elasticbeanstalk.com/"
        token: ${{ secrets.GITHUB_TOKEN }}
        fail_action: false
        cmd_options: >
          -a
          -m 0
          -T 5
        docker_name: ghcr.io/zaproxy/zaproxy:stable
        upload_artifact: false

    - name: Upload ZAP Reports
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: |
          report_html.html
          report_md.md
          report_json.json
          
          
          
    # ==========================================
  # JOB 4: Deploy Frontend (Elastic Beanstalk)
  # ==========================================
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [test-and-analyze, security-scan, deploy-lambda]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ secrets.AWS_REGION }}
    
    - name: Generate Deployment Package
      run: |
        cd eb-website
        zip -r ../deploy.zip .
        cd ..
    
    - name: Deploy to Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v20
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws_session_token: ${{ secrets.AWS_SESSION_TOKEN }}
        application_name: ${{ secrets.EB_APP_NAME }}
        environment_name: ${{ secrets.EB_ENV_NAME }}
        version_label: ${{ github.sha }}
        region: ${{ secrets.AWS_REGION }}
        deployment_package: deploy.zip

  # ==========================================
  # JOB 5: Smoke Test (Verify Deployment)
  # ==========================================
  smoke-test:
    runs-on: ubuntu-latest
    needs: [deploy-lambda, deploy-frontend]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Test Lambda Health
      run: |
        sleep 30  # Wait for deployment
        curl -f https://v68fi30gr9.execute-api.us-east-1.amazonaws.com/prod/loan/health || exit 1
    
    - name: Test Loan Calculation
      run: |
        curl -X POST \
          https://v68fi30gr9.execute-api.us-east-1.amazonaws.com/prod/loan/calculate \
          -H "Content-Type: application/json" \
          -d '{"principal": 500000, "annual_rate": 8.5, "years": 20}' \
          | grep -q "emi" || exit 1
    
    - name: Test Frontend
      run: |
        curl -f http://newapp-env.eba-pbimppjz.us-east-1.elasticbeanstalk.com/ || exit 1
    
    - name: Deployment Success Notification
      run: echo "✅ All deployments successful and verified!"

  # ================== DEPLOYMENT ARTIFACT ==================
  generate-artifacts:
    name: Generate Deployment Package
    runs-on: ubuntu-latest
    needs: [ci_pipeline, zap-scan]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate deployment package
      run: |
        cd eb-website
        zip -r ../scalable-financial-suite-v${{ github.run_number }}.zip .
        cd ..

    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: deployment-package
        path: scalable-financial-suite-v${{ github.run_number }}.zip
        retention-days: 30
