name: CI/CD Pipeline

permissions:
  issues: write
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # ================== CI PIPELINE ==================
  ci_pipeline:
    name: Python CI + Bandit
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r eb-website/requirements.txt
        pip install pytest coverage bandit

    - name: Run tests
      run: |
        cd eb-website
        python -m pytest test_app.py -v || true
        cd ..

    - name: Generate coverage
      run: |
        cd eb-website
        coverage run -m pytest test_app.py || true
        coverage xml || true
        cd ..

    - name: Upload Coverage XML
      uses: actions/upload-artifact@v4
      with:
        name: coverage-xml
        path: eb-website/coverage.xml

    - name: Run Bandit Security Scan
      run: bandit -r eb-website/ loan_service/ -ll || true

  # ================== SONARCLOUD ==================
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: ci_pipeline
    continue-on-error: true  # Don't fail build

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@ffc3010689be73b8e5ae0c57ce35968afd7909e8
      with:
        args: >
          -Dsonar.python.coverage.reportPaths=eb-website/coverage.xml
          -Dsonar.qualitygate.wait=false
          -Dsonar.projectKey=jeevanjot011_ScalableComputing
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=jeevanjot011
          -Dsonar.sources=.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ================== ZAP BASELINE SCAN ==================
  zap-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    needs: ci_pipeline

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run ZAP Baseline Scan
      uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25
      with:
        target: "http://newapp-env.eba-pbimppjz.us-east-1.elasticbeanstalk.com/"
        token: ${{ secrets.GITHUB_TOKEN }}
        fail_action: false
        cmd_options: >
          -a
          -m 0
          -T 5
        docker_name: ghcr.io/zaproxy/zaproxy:stable
        upload_artifact: false

    - name: Upload ZAP Reports
      uses: actions/upload-artifact@v4
      with:
        name: zap-report
        path: |
          report_html.html
          report_md.md
          report_json.json

  # ================== DEPLOYMENT ARTIFACT ==================
  generate-artifacts:
    name: Generate Deployment Package
    runs-on: ubuntu-latest
    needs: [ci_pipeline, zap-scan]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate deployment package
      run: |
        cd eb-website
        zip -r ../scalable-financial-suite-v${{ github.run_number }}.zip .
        cd ..

    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: deployment-package
        path: scalable-financial-suite-v${{ github.run_number }}.zip
        retention-days: 30
